<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Vitra Fruit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared-navbar.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: 'Manrope', sans-serif;
      color: #1f2850;
      background: linear-gradient(145deg, rgba(85, 51, 255, 0.12), rgba(23, 162, 184, 0.1));
    }
    .page {
      padding: 28px 18px;
    }
    .card {
      width: min(95vw, 720px);
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.94);
      border-radius: 20px;
      padding: 30px 24px 24px;
      box-shadow: 0 14px 36px rgba(16, 26, 60, 0.16);
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      margin-bottom: 8px;
      text-align: center;
    }
    .lead {
      text-align: center;
      color: #5a678e;
      margin-bottom: 18px;
      line-height: 1.6;
      font-size: 0.98rem;
    }
    form {
      display: grid;
      gap: 12px;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    input, textarea {
      width: 100%;
      border: 1px solid #d4daf2;
      border-radius: 10px;
      padding: 12px 13px;
      font: inherit;
      color: #1f2850;
      background: #fff;
    }
    textarea { min-height: 140px; resize: vertical; }
    input:focus, textarea:focus {
      outline: none;
      border-color: #6b52ff;
      box-shadow: 0 0 0 3px rgba(107, 82, 255, 0.15);
    }
    .hidden-field {
      position: absolute !important;
      left: -9999px !important;
      opacity: 0 !important;
      pointer-events: none !important;
      height: 0 !important;
      width: 0 !important;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
    }
    button, .back {
      border: 0;
      text-decoration: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 12px 22px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.78rem;
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    button {
      color: #fff;
      background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
      box-shadow: 0 9px 18px rgba(238, 90, 111, 0.3);
    }
    .back {
      color: #28325b;
      background: #eef1ff;
    }
    button:hover, .back:hover { transform: translateY(-2px); }
    .status {
      margin-top: 8px;
      text-align: center;
      font-size: 0.92rem;
      min-height: 1.4em;
    }
    .status.success { color: #237942; }
    .status.error { color: #b02f45; }
    @media (max-width: 640px) {
      .row { grid-template-columns: 1fr; }
      .card { padding: 24px 16px 20px; }
    }
  </style>
</head>
<body>
  <header class="nav-wrap" data-site-nav>
    <nav class="site-navbar" aria-label="Main navigation">
      <div class="site-nav-inner">
        <a class="navbar-logo" href="/">
          <picture>
            <source srcset="/images/logo.avif" type="image/avif" />
            <source srcset="/images/logo.webp" type="image/webp" />
            <img src="/images/logo.jpg" alt="Vitra Fruit logo" />
          </picture>
        </a>

        <button class="site-nav-hamburger" type="button" aria-label="Toggle menu" aria-expanded="false" data-menu-toggle>
          <span></span><span></span><span></span>
        </button>

        <ul class="site-nav-menu" data-menu>
          <li><a class="site-nav-link" data-match="home" href="/">Home</a></li>
          <li class="site-nav-dropdown" data-shop-item>
            <button class="site-nav-button" type="button" data-shop-toggle aria-haspopup="true" aria-expanded="false">Shop Now <span aria-hidden="true">▾</span></button>
            <ul class="site-nav-dropdown-menu">
              <li><a href="/dehydrated-fruits.html">Dehydrated Fruits</a></li>
              <li><a href="/shakers.html">Shakers</a></li>
              <li><a href="/fruit-strips.html">Fruit strips</a></li>
              <li><a href="/vegetable-powders.html">Vegetable Powders</a></li>
            </ul>
          </li>
          <li><a class="site-nav-link" data-match="contact" href="/contact.html">Contact</a></li>
          <li><a class="site-nav-link" data-match="account" href="/account.html">Cart</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <main class="page">
    <section class="card">
      <h1>Contact Us</h1>
      <p class="lead">Send us a message and we will get back to you as soon as possible.</p>

      <form id="contactForm" novalidate>
        <div class="row">
          <input type="text" name="name" placeholder="Your Name" required>
          <input type="email" name="email" placeholder="Your Email" required>
        </div>
        <input type="tel" name="phone" placeholder="Phone Number">
        <textarea name="message" placeholder="Your Message" required></textarea>

        <input class="hidden-field" type="text" name="_honey" tabindex="-1" autocomplete="off">
        <input type="hidden" name="_subject" value="New Vitra Fruit Contact Submission">
        <input type="hidden" name="_template" value="table">

        <div class="actions">
          <button type="submit" id="submitBtn">Send Message</button>
          <a class="back" href="/">Back to Home</a>
        </div>
        <p id="formStatus" class="status" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="/shared-navbar.js"></script>
  <script>
    (function () {
      const form = document.getElementById('contactForm');
      const submitBtn = document.getElementById('submitBtn');
      const status = document.getElementById('formStatus');
      const endpoint = 'https://formsubmit.co/ajax/info@vitrafruit.com';

      form.addEventListener('submit', async function (event) {
        event.preventDefault();

        status.textContent = '';
        status.className = 'status';

        const data = new FormData(form);
        if ((data.get('_honey') || '').trim() !== '') {
          status.textContent = 'Submission blocked.';
          status.classList.add('error');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Sending...';

        try {
          const response = await fetch(endpoint, {
            method: 'POST',
            headers: { Accept: 'application/json' },
            body: data
          });
          const result = await response.json();

          if (response.ok && result.success === 'true') {
            form.reset();
            status.textContent = 'Message sent successfully. We will contact you soon.';
            status.classList.add('success');
          } else {
            status.textContent = 'Could not send message right now. Please try again shortly.';
            status.classList.add('error');
          }
        } catch (error) {
          status.textContent = 'Network error. Please check your connection and try again.';
          status.classList.add('error');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Send Message';
        }
      });
    })();
  </script>
</body>
</html>
