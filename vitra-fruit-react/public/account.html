<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account | Vitra Fruit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Manrope', sans-serif; background: #f6f7ff; color: #1f2850; min-height: 100vh; display: grid; place-items: center; padding: 20px; }
    .card { width: min(94vw, 640px); background: #fff; border-radius: 16px; padding: 28px 22px; box-shadow: 0 12px 24px rgba(17, 25, 60, 0.12); text-align: center; }
    h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.7rem, 4vw, 2.4rem); margin-bottom: 10px; }
    p { color: #54618a; line-height: 1.7; margin-bottom: 16px; }
    a { display: inline-block; text-decoration: none; color: #fff; background: linear-gradient(135deg, #ff6b6b, #ee5a6f); border-radius: 999px; padding: 12px 22px; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.78rem; font-weight: 700; }
  </style>
</head>
<body>
  <main class="card">
    <h1>My Account</h1>
    <p>Your account portal will be available soon. Contact us for any order or account help in the meantime.</p>
    <a href="/contact.html">Contact Support</a>
  </main>
</body>
</html>
